[NEAT]
fitness_criterion      = max
fitness_threshold      = 1e9
no_fitness_termination = True
pop_size               = 150
reset_on_extinction    = True

[DefaultGenome]
# Activations: tanh only.
# Mixing tanh/sigmoid/relu plus per-node mutation makes Hebbian-tuned weights
# nonsensical the moment a node's activation flips: weight magnitudes that
# barely move tanh saturate sigmoid and explode ReLU. Single bounded activation
# keeps lifetime learning coherent across NEAT generations.
activation_default      = tanh
activation_mutate_rate  = 0.0
activation_options      = tanh

aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

# Bias: small init, range matched to weight clip so NEAT can't push biases
# into a regime Hebbian can't reach.
bias_init_mean          = 0.0
bias_init_stdev         = 0.5
bias_max_value          = 8.0
bias_min_value          = -8.0
bias_mutate_power       = 0.3
bias_mutate_rate        = 0.2
bias_replace_rate       = 0.02

# Speciation: lower weight coefficient so Hebbian weight drift between
# siblings doesn't artificially fragment species.
compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.5

# Topology mutation: encourage gradual structural exploration; discourage
# bloat early (large jumps in topology destroy lineage continuity).
conn_add_prob           = 0.10
conn_delete_prob        = 0.02

enabled_default         = True
enabled_mutate_rate     = 0.02

# Recurrent connections: inference is already recurrent (hidden state persists
# tick-to-tick in nn_batch.BatchPlan), so let NEAT exploit that — feedback
# loops give bots the temporal memory needed for chase/intercept/lurking.
feed_forward            = False
initial_connection      = partial_nodirect 0.4

node_add_prob           = 0.03
node_delete_prob        = 0.01

# Network shape: small seed; NEAT grows hidden as needed.
num_hidden              = 8
num_inputs              = 74
num_outputs             = 4

response_init_mean      = 1.0
response_init_stdev     = 0.0
response_max_value      = 30.0
response_min_value      = -30.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0

# Weights:
#   * stdev 0.3 keeps initial pre-activations well clear of tanh saturation
#     (fan-in ~23 ⇒ pre σ ≈ 1.4, deep in the responsive region).
#   * mutate_power 0.3 = gentle perturbation: NEAT mutation no longer wipes
#     out the lifetime Hebbian-tuned weights of a survivor.
#   * replace_rate 0.02 = catastrophic resets are rare.
#   * max_value 8 matches the Hebbian clip in nn_batch.apply_reward.
weight_init_mean        = 0.0
weight_init_stdev       = 0.3
weight_max_value        = 8.0
weight_min_value        = -8.0
weight_mutate_power     = 0.3
weight_mutate_rate      = 0.3
weight_replace_rate     = 0.02

[DefaultSpeciesSet]
# At ~30 connections and disjoint_coef=1.0 + weight_coef=0.3, distance
# between unrelated networks lands around 4-6. Threshold 2.5 yields finer
# species (typical NEAT regime); 6 was effectively one-species.
compatibility_threshold = 2

[DefaultStagnation]
species_fitness_func = max
max_stagnation       = 20
species_elitism      = 2

[DefaultReproduction]
# These values are advisory only — TrainingWorld uses GenomePool's tournament
# selection, not neat.Population.run(). Kept consistent with training.py for
# clarity if anyone ever switches to the standard NEAT pipeline.
elitism            = 7
survival_threshold = 0.4
min_species_size   = 3
