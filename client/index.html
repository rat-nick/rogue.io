<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>rogue.io</title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <canvas id="game"></canvas>
    <canvas
      id="minimap"
      width="200"
      height="200"
    ></canvas>

    <div id="hud">Mass: <span id="mass">10</span></div>

    <div id="leaderboard"></div>

    <div
      id="login-screen"
      class="modal-overlay"
    >
      <div class="modal">
        <h1>rogue.io</h1>
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name"
          maxlength="16"
          autofocus
        />
        <button id="play-btn">Play</button>
      </div>
    </div>

    <div
      id="death-screen"
      class="modal-overlay"
      style="display: none"
    >
      <div class="modal">
        <h1>You Died!</h1>
        <p><span id="death-score">Score: 0</span></p>
        <button id="respawn-btn">Respawn</button>
      </div>
    </div>

    <script src="lib/msgpack.min.js"></script>
    <script src="js/state.js"></script>
    <script src="js/viewport.js"></script>
    <script src="js/input.js"></script>
    <script src="js/network.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/minimap.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
